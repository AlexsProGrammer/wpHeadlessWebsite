<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="jupiterAtmosphere" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c684a" />
      <stop offset="12%" stop-color="#dcbfa0" />
      <stop offset="25%" stop-color="#a47851" />
      <stop offset="35%" stop-color="#ebd8c2" />
      <stop offset="48%" stop-color="#7c4723" />
      <stop offset="62%" stop-color="#c9986b" />
      <stop offset="75%" stop-color="#f5e6d3" />
      <stop offset="85%" stop-color="#b0754c" />
      <stop offset="100%" stop-color="#402010" />
    </linearGradient>

    <radialGradient id="sphereShading" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="45%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75" />
    </radialGradient>

    <radialGradient id="redSpot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc3a18" />
      <stop offset="75%" stop-color="#8c200b" />
      <stop offset="100%" stop-color="#541004" stop-opacity="0" />
    </radialGradient>

    <filter id="codeSignatureFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.95"/>
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur" result="brightGlow">
        <feFuncA type="linear" slope="2.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="planetClip">
      <circle cx="256" cy="256" r="240" />
    </clipPath>
  </defs>

  <g clip-path="url(#planetClip)">
    <circle cx="256" cy="256" r="240" fill="url(#jupiterAtmosphere)" />

    <path d="M 10 190 Q 130 170 256 195 T 502 190 L 502 225 Q 370 235 256 215 T 10 225 Z" fill="#613316" opacity="0.45" />
    <path d="M 10 305 Q 160 325 256 305 T 502 305 L 502 330 Q 340 315 256 335 T 10 330 Z" fill="#f0dfcc" opacity="0.35" />
    <path d="M 10 110 Q 120 130 256 110 T 502 110 L 502 125 Q 350 115 256 130 T 10 125 Z" fill="#52321c" opacity="0.3" />

    <g transform="rotate(-4 350 365)">
      <ellipse cx="350" cy="365" rx="46" ry="28" fill="url(#redSpot)" />
      <ellipse cx="350" cy="365" rx="22" ry="12" fill="#ff6230" opacity="0.65" />
    </g>

    <circle cx="256" cy="256" r="240" fill="url(#sphereShading)" />
  </g>

  <g filter="url(#codeSignatureFilter)">
    <path d="M 175 192 L 105 256 L 175 320" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <path d="M 275 168 L 235 344" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <path d="M 337 192 L 407 256 L 337 320" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>

